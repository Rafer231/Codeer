<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --text:#c9d1d9; --pink:#d6336c; }
    body { font-family: 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
    .login-box { background:var(--surface); border:1px solid rgba(255,255,255,0.08); border-radius:20px; padding:40px; width:320px; box-shadow:0 15px 30px rgba(0,0,0,0.5); }
    h2 { color:#fff; margin:0 0 32px; text-align:center; font-size:22px; }
    input { width:100%; padding:14px; margin-bottom:18px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:10px; color:#fff; font-size:15px; outline:none; }
    input:focus { border-color:var(--pink); }
    button { width:100%; padding:14px; background:var(--pink); border:none; border-radius:10px; color:#fff; font-weight:700; font-size:16px; cursor:pointer; }
    button:hover { background:#e64980; }
    .error { color:#e74c3c; text-align:center; margin-bottom:16px; font-size:14px; display:none; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <div class="error" id="error">Invalid credentials</div>
    <form method="POST" action="/login">
      <input type="text" name="username" placeholder="Username" required autocomplete="off">
      <input type="password" name="password" placeholder="Password" required autocomplete="off">
      <button type="submit">Log In</button>
    </form>
  </div>
  <script>
    if (window.location.search.includes('error')) document.getElementById('error').style.display='block';
  </script>
</body>
</html>
