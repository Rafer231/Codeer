<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Adopt Me Duper</title>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --text:#c9d1d9; --pink:#d6336c; --pink2:#ff69b4; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: radial-gradient(circle at 40% 30%, #2d1e30, #0d1117);
      color: var(--text);
      display: flex; align-items: center; justify-content: center; min-height: 100vh; margin:0;
    }
    .login-box {
      background: rgba(22,27,34,0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 36px;
      width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      animation: fadeIn 0.5s cubic-bezier(0.16,1,0.3,1);
    }
    .logo { display:flex; justify-content:center; margin-bottom:24px; }
    .logo img { width:64px; height:64px; border-radius:18px; box-shadow:0 0 20px rgba(255,105,180,0.5); }
    h2 { color:#fff; margin:0 0 8px; text-align:center; font-size:26px; }
    .sub { color: #8b949e; text-align:center; margin-bottom:32px; font-size:14px; }
    .input-group { margin-bottom:20px; }
    label { display:block; font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:#888; margin-bottom:6px; }
    input {
      width:100%; padding:14px 16px;
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:12px; color:#fff; font-size:15px; outline:none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color:var(--pink); box-shadow:0 0 0 3px rgba(214,51,108,0.25); }
    button {
      width:100%; padding:14px;
      background: linear-gradient(135deg, #d6336c, #b92e5a);
      border:none; border-radius:12px;
      color:#fff; font-weight:700; font-size:17px; cursor:pointer;
      transition: background 0.2s, transform 0.2s;
      margin-top:8px;
    }
    button:hover { background: linear-gradient(135deg, #e64980, #c93460); transform: translateY(-1px); }
    .error { background: rgba(231,76,60,0.15); color:#e74c3c; text-align:center; padding:10px; border-radius:8px; margin-bottom:20px; font-size:14px; display:none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <img src="https://www.rw-designer.com/icon-image/22221-256x256x32.png" alt="Adopt Me">
    </div>
    <h2>Adopt Me Duper</h2>
    <div class="sub">Secure Dashboard</div>
    <div class="error" id="error">Invalid credentials. Please try again.</div>
    <form method="POST" action="/login">
      <div class="input-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="Enter" required autocomplete="off">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="off">
      </div>
      <button type="submit">Log In</button>
    </form>
  </div>
  <script>
    if (window.location.search.includes('error')) {
      document.getElementById('error').style.display = 'block';
    }
  </script>
</body>
</html>
